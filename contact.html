<!DOCTYPE html>
<html lang="fr">
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>AfriTalent — Contact</title> 
<!-- Bootstrap 5 via CDN : feuille de style --> 
<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
rel="stylesheet"> 
<!-- Votre feuille de style personnelle --> 
<link rel="stylesheet" href="css/style.css">
</head>
<body> 
<!-- Le contenu de la page sera ajoute ici --> 
 <main class="container my-5">
    <h1 class="text-center mb-5">Contactez-nous</h1>

    <div class="row g-5">
        <div class="col-lg-8">
            <form id="contactForm" novalidate>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" id="nom" class="form-control" required>
                        <div class="error-message" id="error-nom">Le nom est requis.</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Prénom</label>
                        <input type="text" id="prenom" class="form-control" required>
                        <div class="error-message" id="error-prenom">Le prénom est requis.</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" required>
                    <div class="error-message" id="error-email">Veuillez entrer un email valide.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Sujet</label>
                    <select id="sujet" class="form-select" required>
                        <option value="">Choisissez un sujet...</option>
                        <option value="recrutement">Recrutement</option>
                        <option value="partenariat">Partenariat</option>
                        <option value="autre">Autre</option>
                    </select>
                    <div class="error-message" id="error-sujet">Veuillez sélectionner un sujet.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Message (min. 20 caractères)</label>
                    <textarea id="message" class="form-control" rows="5" required></textarea>
                    <div class="error-message" id="error-message-text">Le message doit faire au moins 20 caractères.</div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Envoyer</button>
                <div id="success-msg" class="alert alert-success mt-3 d-none">Message envoyé avec succès !</div>
            </form>
        </div>

        <div class="col-lg-4">
            <div class="mb-4">
                <h4>Nos coordonnées</h4>
                <p>📧 contact@afritalent.com</p>
                <p>📞 +221 33 000 00 00</p>
                <p>📍 Avenue Cheikh Anta Diop, Dakar</p>
            </div>
            
            <div class="ratio ratio-4x3">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15438.099635680215!2d-17.460505266871177!3d14.682882230119644!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xec1725f3676fa21%3A0x147bc7f1291d491!2sMedina%2C%20Dakar!5e0!3m2!1sen!2ssn!4v1777800716662!5m2!1sen!2ssn" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </div>
</main>
<!-- Bootstrap 5 via CDN : script JavaScript --> 
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
></script> 
<!-- Votre script JavaScript --> 
<script src="js/main.js"></script>
</body>
</html>
